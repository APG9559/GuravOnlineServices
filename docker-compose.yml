version: '3.8'
# ─────────────────────────────────────────────────────────────────────────────
#  Family Store — Full Stack Docker Compose
#
#  Services:
#    postgres  — PostgreSQL 16 database
#    backend   — NestJS API  (port 3000)
#    seeder    — Runs once on startup to create default users, then exits
#    frontend  — React app served via nginx  (port 80)
#
#  Usage:
#    docker compose up --build          # first time
#    docker compose up -d               # subsequent starts
#    docker compose down                # stop all
#    docker compose down -v             # stop + delete database volume
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: familystore_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-familystore}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-familystore}' ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NestJS Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: familystore_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-familystore}
      DB_SSL: ${DB_SSL:-false}
      DB_LOGGING: ${DB_LOGGING:-false}
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      RP_ID: ${RP_ID:-localhost}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ 'CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1' ]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Database Seeder (runs once, then exits) ──────────────────────────────
  seeder:
    build:
      context: ./backend
      dockerfile: Dockerfile.seed
    container_name: familystore_seeder
    restart: 'no'
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-familystore}
      DB_SSL: ${DB_SSL:-false}
    depends_on:
      postgres:
        condition: service_healthy

  # ── React Frontend (nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: familystore_frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
    name: familystore_pgdata
